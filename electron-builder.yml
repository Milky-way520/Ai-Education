appId: com.ai-education.app
productName: AI Education
copyright: Copyright © 2024 AI Education Team

npmRebuild: false

directories:
  output: release
  buildResources: electron/build

files:
  - electron/**/*
  - package.json
  - "!.env"
  - "!node_modules/.cache/**/*"
  - "!src/**/*"
  - "!prisma/**/*"
  - "!download/**/*"
  - "!*.log"
  - "!.*"

extraResources:
  - from: ".next/standalone"
    to: "server"
    filter:
      - "**/*"
  - from: "public"
    to: "server/public"
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AI Education

portable:
  artifactName: ${productName}-${version}-Portable.exe

# Mac 配置（预留）
mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - x64
        - arm64

# Linux 配置（预留）
linux:
  category: Education
  target:
    - target: AppImage
      arch:
        - x64

publish: null

# 压缩配置
compression: maximum

# 构建信息
buildVersion: "1.0.0"
